<!DOCTYPE html>
<html><body style="margin:0;padding:0;overflow:hidden">
<!--
  Bridge component:
  - Receives graph_html + height as Streamlit props (via streamlit:render)
  - Renders the graph in an inner iframe (so gnSave postMessages reach us as parent)
  - Relays gnSave events to Streamlit via setComponentValue
  - Sends null after each render to reset the value and avoid processing stale saves
-->
<iframe id="gf" style="width:100%;border:none;display:block"
        sandbox="allow-scripts allow-same-origin"></iframe>
<script>
var _frame   = document.getElementById("gf");
var _lastSent = undefined;   // client-side dedup

function _send(val) {
  var s = JSON.stringify(val);
  if (s === _lastSent) return;
  _lastSent = s;
  window.parent.postMessage(
    { type: "streamlit:setComponentValue", value: val, dataType: "json" },
    "*"
  );
}

// Signal ready to Streamlit
window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");

window.addEventListener("message", function(e) {
  if (!e.data) return;

  // Props arriving from Streamlit
  if (e.data.type === "streamlit:render") {
    var args   = e.data.args || {};
    var height = args.height || 820;
    _frame.style.height = height + "px";
    _frame.srcdoc = args.graph_html || "";
    window.parent.postMessage(
      { type: "streamlit:setFrameHeight", height: height + 2 },
      "*"
    );
    // Reset component value after each render so Python doesn't re-process
    // a stale save on the next unrelated rerun.
    _send(null);
  }

  // Save / archive event posted from the inner graph iframe
  if (e.data.type === "gnSave") {
    _send(e.data.data);
  }
});
</script>
</body></html>
